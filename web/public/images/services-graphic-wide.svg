<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 1024 550" width="1024" height="550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0077ff"/>
    </linearGradient>
    <filter id="glow" x="-0.4" y="-0.4" width="1.8" height="1.8">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="panelGlow" x="-0.05" y="-0.05" width="1.1" height="1.1">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="550" rx="16" fill="url(#bgGrad)"/>
