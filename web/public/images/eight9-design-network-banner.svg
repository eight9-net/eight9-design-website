<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 160" width="1600" height="160"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: darker at edges -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#050a16"/>
      <stop offset="30%"  style="stop-color:#0a0f1e"/>
      <stop offset="70%"  style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#050a16"/>
    </linearGradient>

    <!-- Cyan → blue accent gradient -->
    <linearGradient id="numGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0077ff"/>
    </linearGradient>

    <!-- Glow filter for wordmark text -->
    <filter id="glow" x="-0.04" y="-0.16" width="1.08" height="1.32">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for network nodes -->
    <filter id="nodeGlow" x="-0.675" y="-0.675" width="2.35" height="2.35">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Edge fade masks -->
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#050a16;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#050a16;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#050a16;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#050a16;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="160" fill="url(#bgGrad)"/>

  <!-- Top / bottom border lines -->
  <line x1="0" y1="1"   x2="1600" y2="1"   stroke="#00d4ff" stroke-width="0.5" opacity="0.18"/>
  <line x1="0" y1="159" x2="1600" y2="159" stroke="#00d4ff" stroke-width="0.5" opacity="0.18"/>

  <!-- Full-width mid-line echoing the logo's divider -->
  <line x1="0" y1="98.73" x2="1600" y2="98.73" stroke="#00d4ff" stroke-width="0.5" opacity="0.07"/>

  <!-- ===== LEFT DECORATIVE NETWORK ===== -->
  <g opacity="0.55">
    <circle cx="480" cy="52"  r="4"   fill="none" stroke="#00d4ff" stroke-width="1.2" filter="url(#nodeGlow)"/>
    <circle cx="390" cy="108" r="3"   fill="none" stroke="#0077ff" stroke-width="1.2" filter="url(#nodeGlow)"/>
    <circle cx="270" cy="38"  r="3.5" fill="none" stroke="#00aaff" stroke-width="1.2"/>
    <circle cx="200" cy="115" r="3"   fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="120" cy="68"  r="3"   fill="none" stroke="#0077ff" stroke-width="1"/>
    <circle cx="48"  cy="92"  r="2.5" fill="none" stroke="#00aaff" stroke-width="1" opacity="0.7"/>
    <g stroke="#00d4ff" stroke-width="0.8" opacity="0.6">
      <line x1="480" y1="52"  x2="390" y2="108"/>
      <line x1="480" y1="52"  x2="270" y2="38"/>
      <line x1="270" y1="38"  x2="200" y2="115"/>
      <line x1="390" y1="108" x2="200" y2="115"/>
      <line x1="200" y1="115" x2="120" y2="68"/>
      <line x1="120" y1="68"  x2="48"  y2="92"/>
      <line x1="270" y1="38"  x2="120" y2="68" opacity="0.4"/>
    </g>
  </g>

  <!-- ===== RIGHT DECORATIVE NETWORK (mirror) ===== -->
  <g opacity="0.55">
    <circle cx="1120" cy="52"  r="4"   fill="none" stroke="#00d4ff" stroke-width="1.2" filter="url(#nodeGlow)"/>
    <circle cx="1210" cy="108" r="3"   fill="none" stroke="#0077ff" stroke-width="1.2" filter="url(#nodeGlow)"/>
    <circle cx="1330" cy="38"  r="3.5" fill="none" stroke="#00aaff" stroke-width="1.2"/>
    <circle cx="1400" cy="115" r="3"   fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="1480" cy="68"  r="3"   fill="none" stroke="#0077ff" stroke-width="1"/>
    <circle cx="1552" cy="92"  r="2.5" fill="none" stroke="#00aaff" stroke-width="1" opacity="0.7"/>
    <g stroke="#00d4ff" stroke-width="0.8" opacity="0.6">
      <line x1="1120" y1="52"  x2="1210" y2="108"/>
      <line x1="1120" y1="52"  x2="1330" y2="38"/>
      <line x1="1330" y1="38"  x2="1400" y2="115"/>
      <line x1="1210" y1="108" x2="1400" y2="115"/>
      <line x1="1400" y1="115" x2="1480" y2="68"/>
      <line x1="1480" y1="68"  x2="1552" y2="92"/>
      <line x1="1330" y1="38"  x2="1480" y2="68" opacity="0.4"/>
    </g>
  </g>

  <!-- ===== LOGO (centered: offset 600px so logo spans x=600–1000) ===== -->
  <g transform="translate(600, 0)">

    <!-- Icon mark: central node -->
    <circle cx="58" cy="80" r="8" fill="url(#numGrad)" filter="url(#nodeGlow)"/>

    <!-- Satellite nodes -->
    <circle cx="30"  cy="48"  r="5" fill="none" stroke="#00d4ff" stroke-width="1.5" filter="url(#nodeGlow)"/>
    <circle cx="88"  cy="46"  r="5" fill="none" stroke="#0077ff" stroke-width="1.5" filter="url(#nodeGlow)"/>
    <circle cx="90"  cy="114" r="5" fill="none" stroke="#00d4ff" stroke-width="1.5" filter="url(#nodeGlow)"/>
    <circle cx="28"  cy="112" r="5" fill="none" stroke="#0077ff" stroke-width="1.5" filter="url(#nodeGlow)"/>
    <circle cx="58"  cy="30"  r="4" fill="none" stroke="#00aaff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="58"  cy="130" r="4" fill="none" stroke="#00aaff" stroke-width="1.5" opacity="0.7"/>

    <!-- Connection lines -->
    <g stroke="#00d4ff" stroke-width="1" opacity="0.35">
      <line x1="58" y1="80" x2="30" y2="48"/>
      <line x1="58" y1="80" x2="88" y2="46"/>
      <line x1="58" y1="80" x2="90" y2="114"/>
      <line x1="58" y1="80" x2="28" y2="112"/>
      <line x1="58" y1="80" x2="58" y2="30"/>
      <line x1="58" y1="80" x2="58" y2="130"/>
      <!-- Cross-connections for mesh look -->
      <line x1="30"  y1="48"  x2="88"  y2="46"  opacity="0.4"/>
      <line x1="88"  y1="46"  x2="90"  y2="114" opacity="0.4"/>
      <line x1="90"  y1="114" x2="28"  y2="112" opacity="0.4"/>
      <line x1="28"  y1="112" x2="30"  y2="48"  opacity="0.4"/>
    </g>

    <!-- Outer ring -->
    <circle cx="58" cy="80" r="52" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.12"/>

    <!-- Wordmark: "Eight9" -->
    <text x="132" y="88"
      font-family="'Courier New', Courier, monospace"
      font-size="52px"
      font-weight="700"
      letter-spacing="-1"
      fill="url(#numGrad)"
      filter="url(#glow)">Eight9</text>

    <!-- Divider line -->
    <line x1="132" y1="98.73" x2="377.33" y2="98.73"
          stroke="#00d4ff" stroke-width="0.77" opacity="0.4"/>

    <!-- Subtitle -->
    <text x="134" y="118"
      font-family="'Courier New', Courier, monospace"
      font-size="16px"
      font-weight="400"
      letter-spacing="6"
      fill="#7ab8d4"
      opacity="0.85">DESIGN NETWORK</text>
  </g>

  <!-- Edge fade overlays (blend decorative nodes toward edges) -->
  <rect x="0"    y="0" width="560" height="160" fill="url(#fadeLeft)"/>
  <rect x="1040" y="0" width="560" height="160" fill="url(#fadeRight)"/>
</svg>
