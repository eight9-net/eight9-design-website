<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 512 512"
   width="512"
   height="512"
   version="1.1"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Accent gradient -->
    <linearGradient
       id="numGrad"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff" />
      <stop offset="100%" style="stop-color:#0077ff" />
    </linearGradient>
    <!-- Glow filter for icon nodes -->
    <filter
       id="nodeGlow"
       x="-0.675"
       y="-0.675"
       width="2.35"
       height="2.35">
      <feGaussianBlur stdDeviation="2.2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- ===== ICON MARK: Network nodes ===== -->
  <g transform="translate(4 -91) scale(4.35)">
      <!-- Central node -->
      <circle cx="58" cy="80" r="10.5" fill="url(#numGrad)" filter="url(#nodeGlow)" />
      <!-- Satellite nodes -->
      <circle cx="30" cy="48" r="5" fill="none" stroke="#00d4ff" stroke-width="3.2" filter="url(#nodeGlow)" />
      <circle cx="88" cy="46" r="5" fill="none" stroke="#0077ff" stroke-width="3.2" filter="url(#nodeGlow)" />
      <circle cx="90" cy="114" r="5" fill="none" stroke="#00d4ff" stroke-width="3.2" filter="url(#nodeGlow)" />
      <circle cx="28" cy="112" r="5" fill="none" stroke="#0077ff" stroke-width="3.2" filter="url(#nodeGlow)" />
      <circle cx="58" cy="30" r="4" fill="none" stroke="#00aaff" stroke-width="2.8" opacity="1" />
      <circle cx="58" cy="130" r="4" fill="none" stroke="#00aaff" stroke-width="2.8" opacity="1" />
      <!-- Connection lines -->
      <g stroke="#00d4ff" stroke-width="2.6" stroke-linecap="round" opacity="0.9">
        <line x1="58" y1="80" x2="30" y2="48" />
        <line x1="58" y1="80" x2="88" y2="46" />
        <line x1="58" y1="80" x2="90" y2="114" />
        <line x1="58" y1="80" x2="28" y2="112" />
        <line x1="58" y1="80" x2="58" y2="30" />
        <line x1="58" y1="80" x2="58" y2="130" />
        <!-- Cross connections for mesh look -->
        <line x1="30" y1="48" x2="88" y2="46" opacity="0.52" />
        <line x1="88" y1="46" x2="90" y2="114" opacity="0.52" />
        <line x1="90" y1="114" x2="28" y2="112" opacity="0.52" />
        <line x1="28" y1="112" x2="30" y2="48" opacity="0.52" />
      </g>
      <!-- Thin outer ring -->
      <circle cx="58" cy="80" r="52" fill="none" stroke="#00d4ff" stroke-width="2.4" opacity="0.44" />
  </g>
</svg>
